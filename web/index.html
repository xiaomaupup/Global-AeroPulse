<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>COMAC 航空市场日报</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", "PingFang SC", "Microsoft YaHei",
                   Helvetica, Arial, sans-serif;
      background-color: #020617;
      color: #e5e7eb;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, #1d4ed8 0, #020617 55%);
    }
    header {
      padding: 16px 16px 8px;
    }
    .app-name {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .title {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 700;
      color: #f9fafb;
    }
    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: #9ca3af;
    }
    .container {
      flex: 1;
      margin-top: 6px;
      background: rgba(15, 23, 42, 0.96);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      box-shadow: 0 -10px 30px rgba(15, 23, 42, 0.9);
      padding: 12px 10px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    @media (min-width: 768px) {
      .container {
        flex-direction: row;
        align-items: flex-start;
        padding: 16px 16px 20px;
      }
    }
    .sidebar {
      width: 100%;
      max-height: 220px;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(31, 41, 55, 0.9);
    }
    @media (min-width: 768px) {
      .sidebar {
        width: 240px;
        max-height: none;
        border-bottom: none;
        border-right: 1px solid rgba(31, 41, 55, 0.9);
        padding-right: 8px;
        overflow-y: auto;
        white-space: normal;
      }
    }
    .sidebar-title {
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .date-list {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }
    @media (min-width: 768px) {
      .date-list {
        flex-direction: column;
      }
    }
    .date-item {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-size: 12px;
      min-width: 90px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .date-item span.date {
      font-weight: 600;
    }
    .date-item span.count {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .date-item.active {
      border-color: #60a5fa;
      background: radial-gradient(circle at top left, #1d4ed8 0, #020617 60%);
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.5);
    }
    .main {
      flex: 1;
      padding-top: 8px;
    }
    @media (min-width: 768px) {
      .main {
        padding-left: 12px;
        padding-top: 0;
      }
    }
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
    }
    .main-title {
      font-size: 14px;
      font-weight: 600;
      color: #e5e7eb;
    }
    .main-sub {
      font-size: 11px;
      color: #9ca3af;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      color: #9ca3af;
    }
    .news-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .news-card {
      padding: 10px 10px 9px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(31, 41, 55, 0.95);
    }
    .news-header {
      margin-bottom: 4px;
    }
    .news-title {
      font-size: 13px;
      font-weight: 600;
      color: #f9fafb;
      margin-bottom: 3px;
    }
    .news-source {
      font-size: 11px;
      color: #bfdbfe;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .news-source-label {
      font-size: 11px;
      color: #6b7280;
    }
    .news-summary {
      font-size: 12px;
      color: #e5e7eb;
      line-height: 1.6;
      margin-top: 4px;
    }
    .news-footer {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .news-meta {
      font-size: 11px;
      color: #6b7280;
    }
    .news-link {
      font-size: 11px;
      color: #60a5fa;
      text-decoration: none;
      white-space: nowrap;
    }
    .news-link:hover {
      text-decoration: underline;
    }
    .empty {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 12px;
    }
    .loading {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
    }
    .error {
      font-size: 12px;
      color: #f97373;
      margin-top: 8px;
    }
    .footer {
      padding: 8px 12px 12px;
      font-size: 10px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="app-name">COMAC · AVIATION INSIGHTS</div>
      <h1 class="title">全球航空市场日报</h1>
      <div class="subtitle">基于公开 RSS 与 LLM 自动整理 · 面向中国商飞市场与营销团队</div>
    </header>
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-title">选择日期</div>
        <div id="date-list" class="date-list"></div>
      </aside>
      <main class="main">
        <div class="main-header">
          <div>
            <div id="main-title" class="main-title">请选择左侧日期</div>
            <div id="main-sub" class="main-sub"></div>
          </div>
          <div id="main-badge" class="badge">欢迎使用 COMAC 航空简报</div>
        </div>
        <div id="status" class="loading">正在加载日期...</div>
        <div id="news-list" class="news-list"></div>
      </main>
    </div>
    <div class="footer">
      本页面基于公开新闻源与大模型自动生成，内容不代表中国商飞官方立场，仅供内部研判参考。
    </div>
  </div>

  <script>
    // ======== 配置：请根据需要调整 ========
    const SUPABASE_URL = "https://tdegkyxrihixbrlpixzz.supabase.co";
    // 使用可公开的 anon / publishable key
    const SUPABASE_ANON_KEY = "sb_publishable_cXHfo9s7ylvJ8BRGtpnbWQ_ul0s2AZz";
    const LANGUAGE = "zh";

    const dateListEl = document.getElementById("date-list");
    const newsListEl = document.getElementById("news-list");
    const statusEl = document.getElementById("status");
    const mainTitleEl = document.getElementById("main-title");
    const mainSubEl = document.getElementById("main-sub");
    const mainBadgeEl = document.getElementById("main-badge");

    let currentDate = null;
    let datesCache = [];

    function setStatus(text, type = "loading") {
      if (!text) {
        statusEl.textContent = "";
        statusEl.className = "";
        return;
      }
      statusEl.textContent = text;
      statusEl.className = type;
    }

    async function fetchJSON(url, params = {}) {
      const headers = {
        apikey: SUPABASE_ANON_KEY,
        Authorization: "Bearer " + SUPABASE_ANON_KEY,
      };
      const res = await fetch(url, { headers, ...params });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(res.status + " " + text);
      }
      return await res.json();
    }

    async function loadDates() {
      try {
        setStatus("正在从 Supabase 加载日期...", "loading");
        // 获取最近 30 天有数据的日期与条数
        const url =
          SUPABASE_URL +
          "/rest/v1/news_items?select=capture_date,language&language=eq." +
          encodeURIComponent(LANGUAGE) +
          "&order=capture_date.desc.nullslast";

        const rows = await fetchJSON(url);
        const counts = {};
        rows.forEach((row) => {
          if (!row.capture_date) return;
          counts[row.capture_date] = (counts[row.capture_date] || 0) + 1;
        });

        const uniqueDates = Object.keys(counts).sort((a, b) =>
          a < b ? 1 : -1
        );

        datesCache = uniqueDates.map((d) => ({
          date: d,
          count: counts[d],
        }));

        renderDateList();

        if (datesCache.length > 0) {
          selectDate(datesCache[0].date);
        } else {
          setStatus("当前没有可用日期，请稍后重试。", "empty");
        }
      } catch (e) {
        console.error(e);
        setStatus("加载日期失败，请检查网络或 Supabase 配置。", "error");
      }
    }

    function renderDateList() {
      dateListEl.innerHTML = "";
      if (datesCache.length === 0) return;

      datesCache.forEach((item) => {
        const div = document.createElement("div");
        div.className = "date-item" + (item.date === currentDate ? " active" : "");
        div.dataset.date = item.date;

        const d = new Date(item.date + "T00:00:00");
        const label =
          d.getMonth() + 1 + "月" + d.getDate() + "日";

        const dateSpan = document.createElement("span");
        dateSpan.className = "date";
        dateSpan.textContent = label;

        const countSpan = document.createElement("span");
        countSpan.className = "count";
        countSpan.textContent = item.count + " 条新闻";

        div.appendChild(dateSpan);
        div.appendChild(countSpan);

        div.addEventListener("click", () => {
          selectDate(item.date);
        });

        dateListEl.appendChild(div);
      });
    }

    async function selectDate(dateStr) {
      if (currentDate === dateStr) return;
      currentDate = dateStr;
      renderDateList();

      const d = new Date(dateStr + "T00:00:00");
      const label =
        d.getFullYear() +
        "年" +
        (d.getMonth() + 1) +
        "月" +
        d.getDate() +
        "日";
      mainTitleEl.textContent = label + " · 航空市场新闻";
      mainSubEl.textContent = "数据来源：全球航空媒体与机构 RSS · 语言：" + LANGUAGE.toUpperCase();
      mainBadgeEl.textContent = "Supabase 实时数据";

      await loadNewsForDate(dateStr);
    }

    async function loadNewsForDate(dateStr) {
      try {
        setStatus("正在加载当前日期的新闻...", "loading");
        newsListEl.innerHTML = "";

        const url =
          SUPABASE_URL +
          "/rest/v1/news_items?capture_date=eq." +
          encodeURIComponent(dateStr) +
          "&language=eq." +
          encodeURIComponent(LANGUAGE) +
          "&order=source_name.asc";

        const rows = await fetchJSON(url);

        if (!rows || rows.length === 0) {
          setStatus("该日期暂无数据。", "empty");
          return;
        }

        setStatus("");
        rows.forEach((row) => {
          const card = document.createElement("div");
          card.className = "news-card";

          const header = document.createElement("div");
          header.className = "news-header";
          const titleEl = document.createElement("div");
          titleEl.className = "news-title";
          titleEl.textContent = row.title || "(无标题)";
          const sourceEl = document.createElement("div");
          sourceEl.className = "news-source";
          const sourceLabel = document.createElement("span");
          sourceLabel.className = "news-source-label";
          sourceLabel.textContent = "来源";
          const sourceName = document.createElement("span");
          sourceName.textContent = row.source_name || "未知来源";
          sourceEl.appendChild(sourceLabel);
          sourceEl.appendChild(sourceName);
          header.appendChild(titleEl);
          header.appendChild(sourceEl);

          const summaryEl = document.createElement("div");
          summaryEl.className = "news-summary";
          summaryEl.textContent =
            (row.summary || "").trim() || "（原文暂无简介，可通过链接查看详情）";

          const footer = document.createElement("div");
          footer.className = "news-footer";

          const metaEl = document.createElement("div");
          metaEl.className = "news-meta";
          metaEl.textContent = row.published_at
            ? "时间：" + row.published_at
            : "";

          const linkEl = document.createElement("a");
          linkEl.className = "news-link";
          linkEl.textContent = "查看原文";
          linkEl.href = row.url || "#";
          linkEl.target = "_blank";
          linkEl.rel = "noopener noreferrer";

          footer.appendChild(metaEl);
          footer.appendChild(linkEl);

          card.appendChild(header);
          card.appendChild(summaryEl);
          card.appendChild(footer);

          newsListEl.appendChild(card);
        });
      } catch (e) {
        console.error(e);
        setStatus("加载新闻失败，请检查网络或 Supabase 配置。", "error");
      }
    }

    // 初始化
    loadDates();
  </script>
</body>
</html>
