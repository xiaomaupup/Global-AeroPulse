# 将 web/ 目录发布为 GitHub Pages，支持自定义域名（如 news.wittywiz.cc）
name: Deploy News Page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
