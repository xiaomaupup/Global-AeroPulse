name: Daily AI News Digest

on:
  # 每天早上 9:00 北京时间 = 1:00 UTC（航空日报定时推送）
  schedule:
    - cron: "0 1 * * *"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-and-send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 避免同一时间重复跑（例如你手动点了 Run，又刚好撞上 cron）
    concurrency:
      group: daily-news-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and send AI news digest
        env:
          # 让日志实时输出
          PYTHONUNBUFFERED: "1"

          # =========================
          # 1) LLM（默认 deepseek）
          # =========================
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

          # =========================
          # 2) 语言（默认 zh）
          # =========================
          AI_RESPONSE_LANGUAGE: ${{ secrets.AI_RESPONSE_LANGUAGE || 'zh' }}

          # =========================
          # 3) 入库（必须配置）
          # =========================
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          # =========================
          # 4) 通知（默认关闭，避免因通知失败导致整次任务失败）
          # =========================
          NOTIFICATION_METHODS: ${{ secrets.NOTIFICATION_METHODS || '' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

        run: |
          python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            *.log
          retention-days: 7
